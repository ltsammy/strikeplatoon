name: Release Launcher

on:
  push:
    branches:
      - main
    paths-ignore:
      - modlist.html
      - .github/workflows/release-launcher.yml

permissions:
  contents: write

jobs:
  build-launcher:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine next release version
        id: next_version
        uses: actions/github-script@v7
        with:
          script: |
            function bumpVersion(tag) {
              if (!tag) {
                return '1';
              }

              const match = tag.match(/^(.*?)(\d+)([^\d]*)$/);
              if (!match) {
                return `${tag}.1`;
              }

              const [, prefix, numberPart, suffix] = match;
              return `${prefix}${Number(numberPart) + 1}${suffix}`;
            }

            let currentTag = '';
            try {
              const latest = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              currentTag = latest.data.tag_name || '';
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const nextTag = bumpVersion(currentTag);
            core.setOutput('current', currentTag);
            core.setOutput('tag', nextTag);
            core.setOutput('name', `104 Launcher v${nextTag}`);

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r launcher/requirements.txt pyinstaller

      - name: Write release version
        env:
          RELEASE_TAG: ${{ steps.next_version.outputs.tag }}
        run: |
          python -c "from pathlib import Path; import os; version = os.environ['RELEASE_TAG']; Path('launcher/version.py').write_text(f'LAUNCHER_VERSION = {version!r}\n', encoding='utf-8')"

      - name: Write EXE version resource
        env:
          RELEASE_TAG: ${{ steps.next_version.outputs.tag }}
        run: |
          python -c "from pathlib import Path; import os; import re; tag = os.environ['RELEASE_TAG']; nums = [int(x) for x in re.findall(r'\d+', tag)][:4]; nums += [0] * (4 - len(nums)); fv = '.'.join(str(n) for n in nums); text = f'''# UTF-8\nVSVersionInfo(\n  ffi=FixedFileInfo(\n    filevers=({nums[0]}, {nums[1]}, {nums[2]}, {nums[3]}),\n    prodvers=({nums[0]}, {nums[1]}, {nums[2]}, {nums[3]}),\n    mask=0x3f,\n    flags=0x0,\n    OS=0x4,\n    fileType=0x1,\n    subtype=0x0,\n    date=(0, 0)\n  ),\n  kids=[\n    StringFileInfo(\n      [\n        StringTable(\n          '040904B0',\n          [\n            StringStruct('CompanyName', 'Strike Platoon'),\n            StringStruct('FileDescription', '104 Launcher for Arma 3'),\n            StringStruct('FileVersion', '{fv}'),\n            StringStruct('InternalName', 'launcher'),\n            StringStruct('LegalCopyright', 'Strike Platoon'),\n            StringStruct('OriginalFilename', 'launcher.exe'),\n            StringStruct('ProductName', '104 Launcher'),\n            StringStruct('ProductVersion', '{fv}')\n          ]\n        )\n      ]\n    ),\n    VarFileInfo([VarStruct('Translation', [1033, 1200])])\n  ]\n)\n'''; Path('launcher/version_info.txt').write_text(text, encoding='utf-8')"

      - name: Build launcher EXE
        run: |
          python -m PyInstaller --noconfirm --clean --distpath dist --workpath build/pyinstaller launcher.spec

      - name: Write SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 dist/launcher.exe).Hash.ToLower()
          Set-Content -Path dist/launcher.exe.sha256 -Value "$hash  launcher.exe" -Encoding Ascii

      - name: Create GitHub release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          name: ${{ steps.next_version.outputs.name }}
          generate_release_notes: true
          files: |
            dist/launcher.exe
            dist/launcher.exe.sha256
          overwrite_files: true