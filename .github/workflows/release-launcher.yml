name: Release Launcher

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-launcher:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r launcher/requirements.txt pyinstaller

      - name: Write release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -c "from pathlib import Path; import os; version = os.environ['RELEASE_TAG']; Path('launcher/version.py').write_text(f'LAUNCHER_VERSION = {version!r}\n', encoding='utf-8')"

      - name: Build launcher EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name 104Launcher --distpath dist --workpath build/pyinstaller --specpath . --add-data "launcher/logo.png;." --add-data "launcher/logo.ico;." --icon launcher/logo.ico launcher/launcher.py

      - name: Upload launcher asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/104Launcher.exe
          overwrite_files: true